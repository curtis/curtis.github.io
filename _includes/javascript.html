<script>

          var feed = new Instafeed({
            accessToken: data.Token,
            limit: 24,
            template: '<a target="_blank" href="{{link}}"><img src="{{image}}" width="210" height="210" alt="{{caption}}" /></a>'
          });
          feed.run();
        })
        .catch(function(error) {
          console.log(error);
        });
