---
layout: default
---

<div class="page-header">
  <h1>
    {% if page.title %}
      {{ page.title }}
    {% else %}
      {{ site.title }}
    {% endif %}
  </h1>

  {% if page.description %}
    <p class="page-description">{{ page.description }}</p>
  {% elsif site.description %}
    <p class="page-description">{{ site.description }}</p>
  {% endif %}
</div>

<div class="site-content">
  {{ content }}
</div>
