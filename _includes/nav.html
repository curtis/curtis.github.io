<!-- Navigation -->
<nav>
  <div class="site-nav">
    <a class="site-nav__title" href="{{ site.baseurl }}/">
      <span class="prompt">~/</span>{{ site.title | downcase }}
    </a>

    <div class="site-nav__right">
      <button class="site-nav__menu-toggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="nav-links" onclick="var ul=document.getElementById('nav-links');ul.classList.toggle('is-open');this.setAttribute('aria-expanded',ul.classList.contains('is-open'))">
        <i class="fa-solid fa-bars" aria-hidden="true"></i>
      </button>

      <ul class="site-nav__links" id="nav-links">
        {% assign pages = site.pages | where:"nav",true %}
        {% for pg in pages %}
          {% if pg.title %}
            <li><a href="{{ pg.url | prepend: site.baseurl }}">{{ pg.title | downcase }}</a></li>
          {% endif %}
        {% endfor %}
      </ul>
    </div>
  </div>
</nav>
