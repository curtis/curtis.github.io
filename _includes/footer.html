<!-- Footer -->
<footer class="site-footer">
  <div class="site-footer__inner">
    <p class="footer-copy">
      &copy; {{ site.author }} 2006&ndash;{{ site.time | date: '%Y' }}
      &middot;
      <a href="{{ "/privacy" | prepend: site.baseurl }}">Privacy</a>
      &middot;
      <a href="{{ "/terms" | prepend: site.baseurl }}">Terms</a>
    </p>

    <ul class="footer-links">
      <li>
        <a href="{{ "/feed.xml" | prepend: site.baseurl }}" aria-label="RSS Feed">
          <i class="fa-solid fa-rss" aria-hidden="true"></i>
        </a>
      </li>
      {% if site.twitter_username %}
        <li>
          <a href="https://twitter.com/{{ site.twitter_username }}" aria-label="Twitter">
            <i class="fa-brands fa-x-twitter" aria-hidden="true"></i>
          </a>
        </li>
      {% endif %}
      {% if site.github_username %}
        <li>
          <a href="https://github.com/{{ site.github_username }}" aria-label="GitHub">
            <i class="fa-brands fa-github" aria-hidden="true"></i>
          </a>
        </li>
      {% endif %}
      {% if site.linkedin_username %}
        <li>
          <a href="https://www.linkedin.com/in/{{ site.linkedin_username }}" aria-label="LinkedIn">
            <i class="fa-brands fa-linkedin-in" aria-hidden="true"></i>
          </a>
        </li>
      {% endif %}
    </ul>
  </div>
</footer>
