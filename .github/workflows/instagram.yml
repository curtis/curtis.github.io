name: Update Instagram Feed

on:
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 6am UTC
  workflow_dispatch: # Manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Refresh token
        id: refresh
        run: |
          RESPONSE=$(curl -s "https://graph.instagram.com/refresh_access_token?grant_type=ig_refresh_token&access_token=${{ secrets.INSTAGRAM_TOKEN }}")
          echo "$RESPONSE"
          # Check if refresh succeeded
          if echo "$RESPONSE" | jq -e '.access_token' > /dev/null 2>&1; then
            echo "Token refreshed successfully"
            NEW_TOKEN=$(echo "$RESPONSE" | jq -r '.access_token')
            echo "token=$NEW_TOKEN" >> $GITHUB_OUTPUT
          else
            echo "::warning::Token refresh failed. Token may be expired. Generate a new one and update the INSTAGRAM_TOKEN secret."
            echo "token=${{ secrets.INSTAGRAM_TOKEN }}" >> $GITHUB_OUTPUT
          fi

      - name: Fetch Instagram media
        run: |
          TOKEN="${{ steps.refresh.outputs.token }}"
          # Fetch recent media (up to 24 posts)
          MEDIA=$(curl -s "https://graph.instagram.com/me/media?fields=id,caption,media_type,media_url,thumbnail_url,permalink,timestamp&limit=24&access_token=$TOKEN")

          # Check for errors
          if echo "$MEDIA" | jq -e '.error' > /dev/null 2>&1; then
            echo "::error::Instagram API error: $(echo "$MEDIA" | jq -r '.error.message')"
            exit 1
          fi

          # Filter to images and carousels only, write clean JSON
          echo "$MEDIA" | jq '[.data[] | select(.media_type == "IMAGE" or .media_type == "CAROUSEL_ALBUM") | {
            id: .id,
            caption: (.caption // ""),
            url: .media_url,
            permalink: .permalink,
            timestamp: .timestamp
          }]' > _data/instagram.json

          echo "Fetched $(jq length _data/instagram.json) photos"
          cat _data/instagram.json | jq '.[0]'

      - name: Commit and push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add _data/instagram.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update Instagram feed"
            git push
          fi
